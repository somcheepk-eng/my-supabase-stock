<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบทดสอบปุ่มล็อกอิน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 bg-light text-dark shadow-lg mt-5">
        <h3 class="text-center mb-4">🔑 หน้าทดสอบปุ่มกด</h3>
        
        <div class="mb-3">
          <label class="form-label fw-bold">ชื่อผู้ใช้งาน</label>
          <input type="text" id="user" class="form-control" placeholder="พิมพ์อะไรก็ได้">
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">รหัสผ่าน</label>
          <input type="password" id="pass" class="form-control" placeholder="พิมพ์อะไรก็ได้">
        </div>
        
        <button type="button" class="btn btn-danger w-100 fw-bold" onclick="doLogin()">
          ถ้านิ่งให้มันรู้ไป! (กดทดสอบตรงนี้)
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
// ฟังก์ชันแบบง่ายที่สุด ไม่เชื่อมฐานข้อมูลใดๆ กดแล้วต้องทำงานทันที
function doLogin() {
    const u = $('#user').val().trim();
    const p = $('#pass').val().trim();

    if (u === '' || p === '') {
        Swal.fire('ปุ่มทำงานแล้ว!', 'คุณปล่อยช่องว่างไว้ ปุ่มตรวจสอบเจอเรียบร้อยครับ 🎉', 'warning');
    } else {
        Swal.fire('สำเร็จ!', `คุณกรอกคำว่า ชื่อ: ${u} และ รหัส: ${p}`, 'success');
    }
}
</script>

</body>
</html>
