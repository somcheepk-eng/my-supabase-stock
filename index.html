<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสต็อกวัสดุและสารเคมี-2</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root { --primary-color: #2c3e50; }
    body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .navbar { background: var(--primary-color) !important; color: white; }
    .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .hidden { display: none; }
    .stock-item-icon { width: 40px; height: 40px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    .badge-qty { background-color: #e8f0fe; color: #1a73e8; padding: 0.4rem 0.6rem; border-radius: 6px; font-weight: bold; }
  </style>
</head>
<body>

<div id="loginPage" class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4 shadow-sm mt-5">
        <h4 class="text-center mb-4"><i class="bi bi-lock-fill"></i> เข้าสู่ระบบคลังวัสดุ-2</h4>
        <div class="mb-3">
          <label class="small fw-bold">ชื่อผู้ใช้งาน (Username)</label>
          <input type="text" id="user" class="form-control" placeholder="ระบุชื่อผู้ใช้งาน">
        </div>
        <div class="mb-3">
          <label class="small fw-bold">รหัสผ่าน (Password)</label>
          <input type="password" id="pass" class="form-control" placeholder="ระบุรหัสผ่าน">
        </div>
        <button type="button" class="btn btn-primary w-100 fw-bold" onclick="doLogin()">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>
</div>

<div id="mainPage" class="hidden">
  <nav class="navbar navbar-dark mb-4">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-database-fill-check"></i> ระบบสต็อกวัสดุและสารเคมี-2</span>
      <div class="d-flex align-items-center">
        <span id="userNameDisplay" class="text-light me-3"></span>
        <button class="btn btn-outline-light btn-sm" onclick="confirmLogout()">
          <i class="bi bi-box-arrow-right"></i> ออกจากระบบ
        </button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card p-4 shadow-sm">
          <h5 class="mb-3 text-primary"><i class="bi bi-plus-circle"></i> เพิ่มวัสดุใหม่</h5>
          <form id="stockForm">
            <label class="small mt-2 fw-bold">ชื่อวัสดุ/สารเคมี</label>
            <input type="text" name="name" class="form-control" required>
            
            <label class="small mt-2">ขนาด (Specification)</label>
            <input type="text" name="size" class="form-control" placeholder="เช่น 500ml, XL">
            
            <label class="small mt-2">หมวดหมู่</label>
            <select name="category" class="form-select">
              <option>วัสดุกลาง</option>
              <option>น้ำยาวิชา Blood bank</option>
              <option>น้ำยาวิชา Hematology</option>
              <option>น้ำยาวิชา Immunology</option>
            </select>
            
            <div class="row">
              <div class="col-6">
                <label class="small mt-2 fw-bold">จำนวน</label>
                <input type="number" name="qty" class="form-control" required>
              </div>
              <div class="col-6">
                <label class="small mt-2">หน่วย</label>
                <input type="text" name="unit" class="form-control" placeholder="ขวด/กล่อง">
              </div>
            </div>
            
            <label class="small mt-2">วันหมดอายุ</label>
            <input type="date" name="expiry" class="form-control">
            
            <button type="button" onclick="submitForm()" id="btnSave" class="btn btn-success w-100 mt-4 shadow-sm fw-bold">บันทึกลงฐานข้อมูล</button>
          </form>
        </div>
      </div>

      <div class="col-md-8">        
        <div class="card p-4 shadow-sm mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-list-stars text-primary"></i> รายการในคลังข้อมูล (Stock)</h5>
            <input type="text" id="searchStock" class="form-control form-control-sm w-50" placeholder="ค้นหารายการ...">
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>รูป</th>
                  <th>รายการ/ขนาด</th>
                  <th>คงเหลือ</th>
                  <th>วันหมดอายุ</th>
                  <th class="text-center">จัดการ</th>
                </tr>
              </thead>
              <tbody id="dataTable"></tbody>
            </table>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-3 small text-muted">
            <div id="stockInfo">แสดง 0 รายการ</div>
            <nav><ul class="pagination pagination-sm mb-0" id="stockPagination"></ul></nav>
          </div>
        </div>

        <div class="card p-4 shadow-sm">
          <h5 class="mb-3 text-secondary"><i class="bi bi-clock-history"></i> ประวัติการเบิก-จ่าย ล่าสุด</h5>
          <div class="table-responsive">
            <table class="table table-sm table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>คำสั่ง</th>
                  <th>รายการวัสดุ</th>
                  <th>หมวดหมู่</th>
                  <th>จำนวน</th>
                  <th>ผู้ทำรายการ</th>
                </tr>
              </thead>
              <tbody id="logsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const clientUrl = "https://cqcnpuwpozqwmwgufxzn.supabase.co"; 
const clientKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxY25wdXdwb3pxd213Z3VmeHpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODMxNTgsImV4cCI6MjA5NjU1OTE1OH0.3A_C2Og_sxHHmgb4dIFsMjQHzrdCbtOKvVwgiuviB1c"; 

const supabaseConnection = supabase.createClient(clientUrl, clientKey);

let masterStockData = []; 
let filteredStock = [];   
const rowsPerPage = 5;    
let currentStockPage = 1;
let currentUserName = "Admin"; 

$(document).ready(function() {
    $('#searchStock').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        filteredStock = masterStockData.filter(item => {
            const nameKey = Object.keys(item).find(k => k.toLowerCase() === 'name');
            const sizeKey = Object.keys(item).find(k => k.toLowerCase() === 'size');
            const nameVal = nameKey ? (item[nameKey] || '').toLowerCase() : '';
            const sizeVal = sizeKey ? (item[sizeKey] || '').toLowerCase() : '';
            return nameVal.includes(keyword) || sizeVal.includes(keyword);
        });
        currentStockPage = 1;
        renderStockTable();
    });
});

// 🔐 ฟังก์ชันล็อกอินอัจฉริยะ (สแกนหาคอลัมน์อัตโนมัติหมดปัญหาพังเพราะตัวพิมพ์เล็ก/ใหญ่)
async function doLogin() {
    const usernameInput = $('#user').val() ? $('#user').val().trim() : '';
    const passwordInput = $('#pass').val() ? $('#pass').val().trim() : '';

    if (usernameInput === '' || passwordInput === '') {
        Swal.fire('คำเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วนนะครับ', 'warning');
        return;
    }

    Swal.fire({ title: 'กำลังตรวจสอบข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    try {
        const { data: allUsers, error } = await supabaseConnection.from('Users').select('*');
        Swal.close();

        if (error) {
            Swal.fire('เกิดข้อผิดพลาดจากฐานข้อมูล', error.message, 'error');
            return;
        }

        const matchedUser = allUsers ? allUsers.find(u => {
            const dbUserKey = Object.keys(u).find(k => k.toLowerCase() === 'username');
            const dbPassKey = Object.keys(u).find(k => k.toLowerCase() === 'password');
            if (!dbUserKey || !dbPassKey) return false;

            const dbUsername = (u[dbUserKey] || '').toString().trim().toLowerCase();
            const dbPassword = (u[dbPassKey] || '').toString().trim();
            return dbUsername === usernameInput.toLowerCase() && dbPassword === passwordInput;
        }) : null;

        if (matchedUser) {
            const dbNameKey = Object.keys(matchedUser).find(k => k.toLowerCase() === 'fullname');
            currentUserName = dbNameKey ? matchedUser[dbNameKey] : usernameInput;
            
            $('#userNameDisplay').html(`<i class="bi bi-person-circle"></i> คุณ: ${currentUserName}`);
            $('#loginPage').addClass('hidden');
            $('#mainPage').removeClass('hidden');

            Swal.fire('สำเร็จ!', `ยินดีต้อนรับคุณ ${currentUserName} เข้าสู่ระบบ`, 'success');
            loadStockData();
            loadLogsData();
        } else {
            Swal.fire('ล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error');
        }
    } catch (err) {
        Swal.close();
        Swal.fire('ผิดพลาดร้ายแรง', 'สาเหตุ: ' + err.message, 'error');
    }
}

async function loadStockData() {
    $('#dataTable').html('<tr><td colspan="5" class="text-center text-muted">กำลังดึงข้อมูลคลัง...</td></tr>');
    const { data: Materials, error } = await supabaseConnection.from('Materials').select('*');
    
    if (error) {
        $('#dataTable').html(`<tr><td colspan="5" class="text-center text-danger">ผิดพลาด: ${error.message}</td></tr>`);
        return;
    }

    // เรียงลำดับตัวอักษรฝั่งสคริปต์เพื่อป้องกันปัญหาหาคอลัมน์ Name พิมพ์เล็กพิมพ์ใหญ่ไม่เจอ
    masterStockData = Materials ? Materials.sort((a, b) => {
        const aKey = Object.keys(a).find(k => k.toLowerCase() === 'name');
        const bKey = Object.keys(b).find(k => k.toLowerCase() === 'name');
        const aVal = aKey ? (a[aKey] || '') : '';
        const bVal = bKey ? (b[bKey] || '') : '';
        return aVal.localeCompare(bVal, 'th');
    }) : [];

    filteredStock = masterStockData;
    renderStockTable();
}

function renderStockTable() {
    const startIndex = (currentStockPage - 1) * rowsPerPage;
    const endIndex = Math.min(startIndex + rowsPerPage, filteredStock.length);
    const pageData = filteredStock.slice(startIndex, endIndex);

    let html = '';
    if (pageData.length === 0) {
        html = '<tr><td colspan="5" class="text-center text-muted">ไม่พบข้อมูลรายการคลัง</td></tr>';
    } else {
        pageData.forEach(row => {
            // ✨ ทำลายจุดเสี่ยง: ค้นหา Key จริงใน Object ทั้งหมด
            const idKey = Object.keys(row).find(k => k.toLowerCase() === 'id');
            const nameKey = Object.keys(row).find(k => k.toLowerCase() === 'name');
            const sizeKey = Object.keys(row).find(k => k.toLowerCase() === 'size');
            const categoryKey = Object.keys(row).find(k => k.toLowerCase() === 'category');
            const qtyKey = Object.keys(row).find(k => k.toLowerCase() === 'qty');
            const unitKey = Object.keys(row).find(k => k.toLowerCase() === 'unit');
            const expireKey = Object.keys(row).find(k => k.toLowerCase() === 'expire_date');
            const imgKey = Object.keys(row).find(k => k.toLowerCase() === 'img_url');

            let itemID = idKey ? row[idKey] : '';
            let itemName = nameKey ? row[nameKey] : '-';
            let itemSize = sizeKey ? row[sizeKey] : '-';
            let itemCategory = categoryKey ? row[categoryKey] : 'วัสดุกลาง';
            let itemQty = qtyKey ? (row[qtyKey] || 0) : 0;
            let itemUnit = unitKey ? row[unitKey] : 'หน่วย';
            let itemExpire = expireKey ? row[expireKey] : '-';
            let imgDisplay = (imgKey && row[imgKey]) ? row[imgKey] : 'https://via.placeholder.com/40?text=No';

            let safeName = itemName.replace(/'/g, "\\'");

            html += `
            <tr style="vertical-align: middle;">
                <td><img src="${imgDisplay}" class="stock-item-icon"></td>
                <td>
                    <div class="fw-bold text-dark">${itemName}</div>
                    <div class="text-primary small fw-bold">ขนาด: ${itemSize}</div>
                    <div class="text-muted small">หมวดหมู่: ${itemCategory}</div>
                </td>
                <td><span class="badge-qty">${itemQty} ${itemUnit}</span></td>
                <td><span class="badge bg-light text-dark">${itemExpire}</span></td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-warning" onclick="manageStock('${itemID}', '${safeName}', ${itemQty}, '${itemUnit}', '${itemCategory}')">เบิก/รับ</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${itemID}')"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`;
        });
    }
    $('#dataTable').html(html);
    $('#stockInfo').text(`แสดง ${filteredStock.length ? startIndex + 1 : 0} ถึง ${endIndex} จากทั้งหมด ${filteredStock.length} รายการ`);
    renderPagination('stockPagination', filteredStock.length, currentStockPage, (p) => { currentStockPage = p; renderStockTable(); });
}

async function manageStock(id, itemName, currentQty, itemUnit, itemCategory) {
    Swal.fire({
        title: `จัดการสต็อก: ${itemName}`,
        html: `
            <p>คงเหลือปัจจุบัน: <b>${currentQty} ${itemUnit}</b></p>
            <select id="swal-type" class="form-select mb-3">
                <option value="รับเข้า">🔄 รับเข้าสต็อก (+)</option>
                <option value="เบิกออก">📉 เบิกจ่ายออก (-)</option>
            </select>
            <input id="swal-qty" type="number" class="form-control" placeholder="ใส่จำนวนที่ต้องการ" min="1">
        `,
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก',
        preConfirm: () => {
            const type = document.getElementById('swal-type').value;
            const changeQty = parseInt(document.getElementById('swal-qty').value);
            if (!changeQty || changeQty <= 0) { Swal.showValidationMessage('กรุณาใส่จำนวนที่ถูกต้อง'); }
            return { type, changeQty };
        }
    }).then(async (result) => {
        if (result.isConfirmed) {
            const { type, changeQty } = result.value;
            let newQty = (type === "เบิกออก") ? currentQty - changeQty : currentQty + changeQty;

            if (newQty < 0) {
                Swal.fire('ข้อผิดพลาด', 'จำนวนในสต็อกไม่พอสำหรับการเบิกออก', 'error');
                return;
            }

            Swal.showLoading();

            // 1. อัปเดตยอดคงเหลือในตาราง Materials
            const sampleItem = masterStockData[0] || {};
            const dbIDCol = Object.keys(sampleItem).find(k => k.toLowerCase() === 'id') || 'id';
            const dbQtyCol = Object.keys(sampleItem).find(k => k.toLowerCase() === 'qty') || 'Qty';

            let updatePayload = {};
            updatePayload[dbQtyCol] = newQty;

            const { error: updateError } = await supabaseConnection
                .from('Materials')
                .update(updatePayload)
                .eq(dbIDCol, id);
                
            if (updateError) { Swal.fire('ล้มเหลวในการอัปเดตสต็อก', updateError.message, 'error'); return; }

            // 2. ✨ บันทึกประวัติลงตาราง Logs (แปลงค่า Qty ให้เป็น Integer แน่นอน 100%)
            const generatedLogID = "LOG-" + Date.now() + "-" + Math.floor(Math.random() * 1000);

            // บังคับเปลี่ยนโครงสร้าง Key ให้เป็น String และพิมพ์ใหญ่ตามตารางจริงแน่นอน
            const logPayload = { 
                "Log ID": String(generatedLogID),
                "Date": String(type), 
                "Item ID": String(id), 
                "Name": String(itemName), 
                "Catgory": String(itemCategory), 
                "Qty": parseInt(changeQty, 10), 
                "Unit": String(itemUnit), 
                "LogUser": String(currentUserName) 
            };
            
            // ยิงข้อมูลเข้าสู่ตาราง Logs และสั่งเลือกดึงข้อมูลกลับ (.select) เพื่อเช็คว่าเข้าตารางจริงไหม
            const { data: logCheck, error: logError } = await supabaseConnection
                .from('Logs')
                .insert([logPayload])
                .select(); // ✨ เพิ่ม .select() เพื่อบังคับให้ตรวจจับสถานะการบันทึกจริง
            
            if (logError) {
                console.error("Log Insert Error:", logError);
                Swal.fire('ตัดสต็อกสำเร็จ แต่บันทึกประวัติล้มเหลว', `สาเหตุหลังบ้าน: ${logError.message}`, 'error');
                loadStockData();
                return;
            }

            // ถ้ายิงผ่านสำเร็จ ข้อมูลในฐานข้อมูลต้องไม่เป็นค่าว่าง
            console.log("บันทึกสำเร็จจริง:", logCheck);
            
            Swal.fire('สำเร็จ', `อัปเดตสต็อกและบันทึกประวัติสำเร็จ คงเหลือ: ${newQty} ${itemUnit}`, 'success');
            loadStockData();

            // 3. แสดงผลบนหน้าเว็บ Real-time
            let newRowHtml = `<tr>
                <td><span class="badge ${type === 'เบิกออก' ? 'bg-danger' : 'bg-success'}">${type}</span></td>
                <td><b>${itemName}</b></td>
                <td>${itemCategory}</td>
                <td><b>${changeQty}</b> ${itemUnit}</td>
                <td><small class="text-muted">${currentUserName}</small></td>
            </tr>`;
            
            if ($('#logsTableBody').html().includes('ไม่พบข้อมูลประวัติ')) {
                $('#logsTableBody').html('');
            }
            $('#logsTableBody').prepend(newRowHtml);
        }
    });
}
async function submitForm() {
    const form = document.getElementById('stockForm');
    const name = form.name.value.trim();
    const size = form.size.value.trim();
    const category = form.category.value;
    const qty = parseInt(form.qty.value);
    const unit = form.unit.value.trim();
    const expiry = form.expiry.value || null;

    if (!name || isNaN(qty)) {
        Swal.fire('คำเตือน', 'กรุณากรอกข้อมูล ชื่อวัสดุ และจำนวน ให้ครบถ้วน', 'warning');
        return;
    }

    Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
    
    // ค้นหาคอลัมน์จากตารางจริง (ยืดหยุ่นเรื่องตัวพิมพ์เล็ก/พิมพ์ใหญ่)
    const sampleItem = masterStockData[0] || {};
    const dbID = Object.keys(sampleItem).find(k => k.toLowerCase() === 'id') || 'id';
    const dbName = Object.keys(sampleItem).find(k => k.toLowerCase() === 'name') || 'Name';
    const dbSize = Object.keys(sampleItem).find(k => k.toLowerCase() === 'size') || 'Size';
    const dbCat = Object.keys(sampleItem).find(k => k.toLowerCase() === 'category') || 'Category';
    const dbQty = Object.keys(sampleItem).find(k => k.toLowerCase() === 'qty') || 'Qty';
    const dbUnit = Object.keys(sampleItem).find(k => k.toLowerCase() === 'unit') || 'Unit';
    const dbExp = Object.keys(sampleItem).find(k => k.toLowerCase() === 'expire_date') || 'Expire_date';
    const dbStatus = Object.keys(sampleItem).find(k => k.toLowerCase() === 'status') || 'Status';
    const dbImg = Object.keys(sampleItem).find(k => k.toLowerCase() === 'img_url') || 'Img_url';

    // 🌟 ✨ คำนวณหาเลข ID ล่าสุดเพื่อทำการรันเลขต่อเนื่อง (+1) ป้องกันค่า null
    let nextID = 1; 
    if (masterStockData && masterStockData.length > 0) {
        // ดึงเลข id ทั้งหมดออกมาแปลงเป็นตัวเลข แล้วหาค่าที่มากที่สุด
        const allIds = masterStockData.map(item => {
            const val = item[dbID];
            return val ? parseInt(val, 10) : 0;
        }).filter(val => !isNaN(val));
        
        if (allIds.length > 0) {
            nextID = Math.max(...allIds) + 1; // เอาค่าสูงสุดมาบวก 1 เช่น มี 5 ก็จะได้เลข 6
        }
    }

    let insertPayload = {};
    insertPayload[dbID] = nextID; // ส่งเลข ID ที่ระบบคำนวณรันให้อัตโนมัติไปให้ Supabase
    insertPayload[dbName] = name;
    insertPayload[dbSize] = size;
    insertPayload[dbCat] = category;
    insertPayload[dbQty] = qty;
    insertPayload[dbUnit] = unit;
    insertPayload[dbExp] = expiry;
    insertPayload[dbStatus] = "ปกติ";
    insertPayload[dbImg] = "";

    const { error } = await supabaseConnection.from('Materials').insert([insertPayload]);
    Swal.close();

    if (error) { 
        Swal.fire('เกิดข้อผิดพลาดในการบันทึก', error.message, 'error'); 
    } else { 
        Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success'); 
        form.reset(); 
        loadStockData(); // โหลดข้อมูลใหม่เพื่อให้ ID ล่าสุดอัปเดตเข้าระบบ
    }
}
async function loadLogsData() {
    // ดึงประวัติทั้งหมดจากตาราง Logs
    const { data: Logs, error } = await supabaseConnection.from('Logs').select('*');
    
    if (!error && Logs) {
        let html = '';
        if (Logs.length === 0) { 
            html = '<tr><td colspan="5" class="text-center text-muted">ไม่พบข้อมูลประวัติ</td></tr>'; 
        } else {
            // ✨ เรียงลำดับเอาตัวที่เพิ่งบันทึก (ชื่อ Log-ID ที่มีค่า Timestamp มากกว่า) ขึ้นก่อน
            const sortedLogs = Logs.sort((a, b) => {
                const aKey = a["Log ID"] || "";
                const bKey = b["Log ID"] || "";
                return bKey.localeCompare(aKey); // เรียงจากข้อความใหม่ไปเก่า
            });

            sortedLogs.forEach(row => {
                let action = row["Date"] || '-';
                let itemLogName = row["Name"] || '-';
                let itemLogCat = row["Catgory"] || '-';
                let itemLogQty = row["Qty"] || 0;
                let itemLogUnit = row["Unit"] || '';
                let itemLogUser = row["LogUser"] || '-';

                html += `<tr>
                    <td><span class="badge ${action === 'เบิกออก' ? 'bg-danger' : 'bg-success'}">${action}</span></td>
                    <td><b>${itemLogName}</b></td>
                    <td>${itemLogCat}</td>
                    <td><b>${itemLogQty}</b> ${itemLogUnit}</td>
                    <td><small class="text-muted">${itemLogUser}</small></td>
                </tr>`;
            });
        }
        $('#logsTableBody').html(html);
    }
}
async function deleteItem(id) {
    Swal.fire({ 
        title: 'ยืนยันการลบ?', 
        text: "รายการนี้จะถูกลบออกจากคลังถาวร!", 
        icon: 'warning', 
        showCancelButton: true, 
        confirmButtonColor: '#d33', 
        confirmButtonText: 'ใช่, ลบเลย!', 
        cancelButtonText: 'ยกเลิก' 
    }).then(async (result) => {
        if (result.isConfirmed) {
            Swal.showLoading();
            
            // 🛠️ ค้นหาชื่อคอลัมน์ ID จริงจากฐานข้อมูลตาราง Materials มาทำการสั่งลบ
            const sampleItem = masterStockData[0] || {};
            const dbIDCol = Object.keys(sampleItem).find(k => k.toLowerCase() === 'id') || 'id';

            const { error } = await supabaseConnection
                .from('Materials')
                .delete()
                .eq(dbIDCol, id);
                
            if (error) { 
                Swal.fire('ล้มเหลว', error.message, 'error'); 
            } else { 
                Swal.fire('ลบแล้ว!', 'ลบข้อมูลสำเร็จ', 'success'); 
                loadStockData(); 
            }
        }
    });
}

function renderPagination(elementId, totalRows, currentPage, onPageClick) {
    const totalPages = Math.ceil(totalRows / rowsPerPage);
    let html = '';
    if(totalPages <= 1) { $(`#${elementId}`).html(''); return; }
    html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="event.preventDefault();">ก่อนหน้า</a></li>`;
    for (let i = 1; i <= totalPages; i++) { html += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`; }
    html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="event.preventDefault();">ถัดไป</a></li>`;
    $(`#${elementId}`).html(html);
    $(`#${elementId} .page-link`).on('click', function(e) { e.preventDefault(); const p = $(this).data('page'); if(p) onPageClick(p); });
}

function confirmLogout() {
    Swal.fire({ title: 'ยืนยันการออกจากระบบ?', icon: 'question', showCancelButton: true, confirmButtonText: 'ออก', cancelButtonText: 'ยกเลิก' }).then((result) => {
        if (result.isConfirmed) { $('#user').val(''); $('#pass').val(''); $('#mainPage').addClass('hidden'); $('#loginPage').removeClass('hidden'); }
    });
}
