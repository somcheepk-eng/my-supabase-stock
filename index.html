<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบล็อกอินคลังวัสดุ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4 shadow mt-5">
        <h4 class="text-center mb-4">🔐 เข้าสู่ระบบคลังวัสดุ</h4>
        
        <div class="mb-3">
          <label class="form-label fw-bold">ชื่อผู้ใช้งาน (username)</label>
          <input type="text" id="user" class="form-control" placeholder="ระบุ username">
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">รหัสผ่าน (password)</label>
          <input type="password" id="pass" class="form-control" placeholder="ระบุ password">
        </div>
        
        <button type="button" class="btn btn-primary w-100 fw-bold" onclick="doLogin()">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔑 เชื่อมต่อ Supabase
const SUPABASE_URL = "https://cqcnpuwpozqwmwgufxzn.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxY25wdXdwb3pxd213Z3VmeHpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODMxNTgsImV4cCI6MjA5NjU1OTE1OH0.3A_C2Og_sxHHmgb4dIFsMjQHzrdCbtOKvVwgiuviB1c"; 

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function doLogin() {
    const username = $('#user').val() ? $('#user').val().trim() : '';
    const password = $('#pass').val() ? $('#pass').val().trim() : '';

    // ตรวจสอบค่าว่าง
    if (username === '' || password === '') {
        Swal.fire('คำเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วนนะครับ', 'warning');
        return;
    }

    // แสดงสถานะกำลังโหลด
    Swal.fire({
        title: 'กำลังตรวจสอบข้อมูล...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });

    try {
        // ยิงไปเช็คกับตาราง Users ตัวพิมพ์เล็กตรงตามจริงของคุณ
        const { data: Users, error } = await supabase
            .from('Users')
            .select('*')
            .eq('username', username)
            .eq('password', password);

        Swal.close(); 

        if (error) {
            Swal.fire('เกิดข้อผิดพลาดจากฐานข้อมูล', error.message, 'error');
            return;
        }

        if (Users && Users.length > 0) {
            // ดึงชื่อเต็มมาแสดง (fullname ตัวเล็กตามคอลัมน์จริง)
            const currentUserName = Users[0].fullname || username;
            Swal.fire('สำเร็จ!', `ยินดีต้อนรับคุณ ${currentUserName} เข้าสู่ระบบ`, 'success');
            
            // ตรงนี้ระบบล็อกอินผ่านแล้ว! สเต็ปถัดไปค่อยเอาหน้าตารางสต็อกมาเปิดต่อครับ
        } else {
            Swal.fire('ล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error');
        }

    } catch (err) {
        Swal.close();
        Swal.fire('ผิดพลาดร้ายแรง', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
    }
}
</script>

</body>
</html>
